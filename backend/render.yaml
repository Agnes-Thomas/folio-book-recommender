services:
  - type: web
    name: folio-book-recommender
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: goodbooks_data
      - key: SVD_SAMPLE
        value: "500000"
